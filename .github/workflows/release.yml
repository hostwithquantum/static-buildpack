---
name: release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DOCKER_REGISTRY: "r.planetary-quantum.com"
      DOCKER_REPO: "buildpacks"
    steps:
      - id: load-registry-credentials
        uses: 1password/load-secrets-action@92467eb28f72e8255933372f1e0707c567ce2259 # v4.0.0
        with:
          export-env: false
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_RUNWAYOSS_SERVICE_ACCOUNT }}
          REGISTRY_USERNAME: op://RunwayOSS/robot-harbor-buildpacks/username
          REGISTRY_PASSWORD: op://RunwayOSS/robot-harbor-buildpacks/password
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.RUNWAY_CI_BOT_APP_ID }}
          private-key: ${{ secrets.RUNWAY_CI_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ steps.load-registry-credentials.outputs.REGISTRY_USERNAME }}
          password: ${{ steps.load-registry-credentials.outputs.REGISTRY_PASSWORD }}
      - uses: goreleaser/goreleaser-action@1a80836c5c9d9e5755a25cb59ec6f45a3b5f41a8 # v7.2.1
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
      - uses: buildpacks/github-actions/setup-tools@3fc05449a74f1a007f75e87d46afea4fb471127f # v5.12.1
      - uses: buildpacks/github-actions/setup-pack@3fc05449a74f1a007f75e87d46afea4fb471127f # v5.12.1
      - id: extract-version
        run: echo "version=$(jq -r '.version' dist/metadata.json)" >> $GITHUB_OUTPUT
      - id: extract-package
        shell: bash
        run: |
          BP_ID="$(cat buildpack.toml | yj -t | jq -r '.buildpack.id | split("/")[1]')"
          PACKAGE="${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPO }}/${BP_ID}"
          echo "package=${PACKAGE}" >> $GITHUB_OUTPUT
          echo "Publishing: ${PACKAGE}" >> $GITHUB_STEP_SUMMARY
      - run: make prep VERSION=${BP_VERSION}
        env:
          BP_VERSION: ${{ steps.extract-version.outputs.version }}
      - run: |
          pack buildpack package \
            ${BP_PACKAGE}:${BP_VERSION} \
            --publish \
            --target linux/amd64 \
            --target linux/arm64 \
            --config package.toml
        working-directory: build
        env:
          BP_PACKAGE: ${{ steps.extract-package.outputs.package }}
          BP_VERSION: ${{ steps.extract-version.outputs.version }}
