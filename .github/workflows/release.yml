---
name: release

on:
  push:
    tags:
      - 'v*'

permissions: {}

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DOCKER_REGISTRY: "r.planetary-quantum.com"
      DOCKER_REPO: "buildpacks"
    steps:
      - uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3
        id: app-token
        with:
          app-id: ${{ secrets.RUNWAY_CI_BOT_APP_ID }}
          private-key: ${{ secrets.RUNWAY_CI_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-contents: write
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0
          persist-credentials: true
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4
        with:
          registry: ${{ env.DOCKER_REGISTRY }}
          username: ${{ secrets.BP_QUANTUM_DOCKER_USERNAME }}
          password: ${{ secrets.BP_QUANTUM_DOCKER_PASSWORD }}
      - uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
      - uses: buildpacks/github-actions/setup-tools@b4faaabcd9dbc5fa332451ae33bce8b583f3ec1b # v5.12.0
      - uses: buildpacks/github-actions/setup-pack@b4faaabcd9dbc5fa332451ae33bce8b583f3ec1b # v5.12.0
      - id: extract-version
        run: echo "version=$(jq -r '.version' dist/metadata.json)" >> $GITHUB_OUTPUT
      - id: extract-package
        shell: bash
        run: |
          BP_ID="$(cat buildpack.toml | yj -t | jq -r '.buildpack.id | split("/")[1]')"
          PACKAGE="${{ env.DOCKER_REGISTRY }}/${{ env.DOCKER_REPO }}/${BP_ID}"
          echo "package=${PACKAGE}" >> $GITHUB_OUTPUT
          echo "Publishing: ${PACKAGE}" >> $GITHUB_STEP_SUMMARY
      - run: make prep VERSION=${BP_VERSION}
        env:
          BP_VERSION: ${{ steps.extract-version.outputs.version }}
      - run: |
          pack buildpack package \
            ${BP_PACKAGE}:${BP_VERSION} \
            --publish \
            --target linux/amd64 \
            --target linux/arm64 \
            --config package.toml
        working-directory: build
        env:
          BP_PACKAGE: ${{ steps.extract-package.outputs.package }}
          BP_VERSION: ${{ steps.extract-version.outputs.version }}
