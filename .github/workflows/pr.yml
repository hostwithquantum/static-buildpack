---
name: pr

on:
  pull_request:


permissions:
  contents: read

env:
  BP_VERSION: dev

jobs:
  check_workflows:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
      - uses: zizmorcore/zizmor-action@71321a20a9ded102f6e9ce5718a2fcec2c4f70d8 # v0.5.2

  build:
    env:
      DOCKER_REGISTRY: "ttl.sh"
      BUILD_DIR: build
    outputs:
      package: ${{ steps.setup.outputs.package }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: go.mod
          cache: false
      - uses: buildpacks/github-actions/setup-tools@b4faaabcd9dbc5fa332451ae33bce8b583f3ec1b # v5.12.0
      - uses: buildpacks/github-actions/setup-pack@b4faaabcd9dbc5fa332451ae33bce8b583f3ec1b # v5.12.0
      - id: setup
        shell: bash
        run: |
          DOCKER_REPO=$(uuidgen)
          PACKAGE="${{ env.DOCKER_REGISTRY }}/${DOCKER_REPO}:20m"
          echo "package=${PACKAGE}" >> $GITHUB_OUTPUT
          echo "Generated name: ${PACKAGE}" >> $GITHUB_STEP_SUMMARY
      - uses: goreleaser/goreleaser-action@ec59f474b9834571250b370d4735c50f8e2d1e29 # v7
        with:
          version: '~> v2'
          args: release --snapshot --clean
      - run: make setup
      - run: |
          make prep \
            VERSION=${{ env.BP_VERSION }} \
            BUILD_DIR=${{ env.BUILD_DIR }}
      - run: |
          pack buildpack package \
            --publish \
            ${PACKAGE} \
            --target linux/amd64 \
            --target linux/arm64 \
            --config package.toml
        working-directory: ${{ env.BUILD_DIR }}
        env:
          PACKAGE: ${{ steps.setup.outputs.package }}

  test:
    needs: build
    runs-on: ${{ matrix.runner }}
    name: ${{ matrix.test }}-${{ matrix.webserver }}-${{ matrix.runner }}
    strategy:
      matrix:
        include:
          # jammy-base (amd64 only) — regression safety net
          - { test: test-hugo, webserver: nginx, builder: "paketobuildpacks/builder-jammy-base:latest", runner: ubuntu-latest }
          - { test: test-hugo, webserver: httpd, builder: "paketobuildpacks/builder-jammy-base:latest", runner: ubuntu-latest }
          - { test: test-hugo-npm, webserver: nginx, builder: "paketobuildpacks/builder-jammy-base:latest", runner: ubuntu-latest }
          - { test: test-hugo-npm, webserver: httpd, builder: "paketobuildpacks/builder-jammy-base:latest", runner: ubuntu-latest }
          - { test: test-hugo-go, webserver: nginx, builder: "paketobuildpacks/builder-jammy-base:latest", runner: ubuntu-latest }
          - { test: test-hugo-go, webserver: httpd, builder: "paketobuildpacks/builder-jammy-base:latest", runner: ubuntu-latest }
          - { test: test-mdbook, webserver: nginx, builder: "paketobuildpacks/builder-jammy-base:latest", runner: ubuntu-latest }
          - { test: test-mdbook, webserver: httpd, builder: "paketobuildpacks/builder-jammy-base:latest", runner: ubuntu-latest }
          # ubuntu-noble (amd64)
          - { test: test-hugo, webserver: nginx, builder: "paketobuildpacks/ubuntu-noble-builder:latest", runner: ubuntu-latest }
          - { test: test-hugo, webserver: httpd, builder: "paketobuildpacks/ubuntu-noble-builder:latest", runner: ubuntu-latest }
          - { test: test-hugo-npm, webserver: nginx, builder: "paketobuildpacks/ubuntu-noble-builder:latest", runner: ubuntu-latest }
          - { test: test-hugo-npm, webserver: httpd, builder: "paketobuildpacks/ubuntu-noble-builder:latest", runner: ubuntu-latest }
          - { test: test-hugo-go, webserver: nginx, builder: "paketobuildpacks/ubuntu-noble-builder:latest", runner: ubuntu-latest }
          - { test: test-hugo-go, webserver: httpd, builder: "paketobuildpacks/ubuntu-noble-builder:latest", runner: ubuntu-latest }
          - { test: test-mdbook, webserver: nginx, builder: "paketobuildpacks/ubuntu-noble-builder:latest", runner: ubuntu-latest }
          - { test: test-mdbook, webserver: httpd, builder: "paketobuildpacks/ubuntu-noble-builder:latest", runner: ubuntu-latest }
          # ubuntu-noble (arm64)
          - { test: test-hugo, webserver: nginx, builder: "paketobuildpacks/ubuntu-noble-builder:latest", runner: ubuntu-24.04-arm }
          - { test: test-hugo, webserver: httpd, builder: "paketobuildpacks/ubuntu-noble-builder:latest", runner: ubuntu-24.04-arm }
          - { test: test-hugo-npm, webserver: nginx, builder: "paketobuildpacks/ubuntu-noble-builder:latest", runner: ubuntu-24.04-arm }
          - { test: test-hugo-npm, webserver: httpd, builder: "paketobuildpacks/ubuntu-noble-builder:latest", runner: ubuntu-24.04-arm }
          - { test: test-hugo-go, webserver: nginx, builder: "paketobuildpacks/ubuntu-noble-builder:latest", runner: ubuntu-24.04-arm }
          - { test: test-hugo-go, webserver: httpd, builder: "paketobuildpacks/ubuntu-noble-builder:latest", runner: ubuntu-24.04-arm }
          - { test: test-mdbook, webserver: nginx, builder: "paketobuildpacks/ubuntu-noble-builder:latest", runner: ubuntu-24.04-arm }
          - { test: test-mdbook, webserver: httpd, builder: "paketobuildpacks/ubuntu-noble-builder:latest", runner: ubuntu-24.04-arm }
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
      - run: docker pull ${PACKAGE}
        env:
          PACKAGE: ${{ needs.build.outputs.package }}
      - name: Update meta-buildpack package.toml
        uses: ./.github/actions/update-static
        with:
          image: "docker://${{ needs.build.outputs.package }}"
          version: ${{ env.BP_VERSION }}
      - uses: buildpacks/github-actions/setup-tools@b4faaabcd9dbc5fa332451ae33bce8b583f3ec1b # v5.12.0
      - uses: buildpacks/github-actions/setup-pack@b4faaabcd9dbc5fa332451ae33bce8b583f3ec1b # v5.12.0
      - run: |
          make setup \
            builder=${{ matrix.builder }}
      - run: |
          make ${{ matrix.test }}-${{ matrix.webserver }} \
            builder=${{ matrix.builder }}
      - name: verify the correct webserver is installed
        run: |
          docker run --rm \
            --entrypoint launcher \
            ${{ matrix.test }}-${{ matrix.webserver }}-app \
            ${{ matrix.webserver }} -v
