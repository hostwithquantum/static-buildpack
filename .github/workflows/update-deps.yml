name: update dependencies

on:
  workflow_dispatch:
  # schedule:
  #   - cron: '1 6 * * *' # daily at 05:01 UTC


concurrency: buildpack_update

permissions: {}

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      BRANCH_NAME: automation/meta-buildpack/update
    steps:
      - uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        id: app-token
        with:
          client-id: ${{ secrets.RUNWAY_CI_BOT_APP_ID }}
          private-key: ${{ secrets.RUNWAY_CI_BOT_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          permission-pull-requests: write
          permission-contents: write
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true
          fetch-depth: 0
      - uses: ./.github/actions/committer
        with:
          slug: ${{ steps.app-token.outputs.app-slug }}
          token: ${{ steps.app-token.outputs.token }}
      - uses: paketo-buildpacks/github-config/actions/pull-request/checkout-branch@fde7603a84a3146cfab723bb3f0a2943219f7522
        with:
          branch: ${{ env.BRANCH_NAME }}
      - name: Update static-websites version from release
        uses: ./.github/actions/update-static
      - id: update
        uses: paketo-buildpacks/github-config/actions/buildpack/update@fde7603a84a3146cfab723bb3f0a2943219f7522 # main
        with:
          buildpack_toml_path: meta-buildpack/buildpack.toml
          package_toml_path: meta-buildpack/package.toml
          no_cnb_registry: true
      - id: commit
        uses: paketo-buildpacks/github-config/actions/pull-request/create-commit@fde7603a84a3146cfab723bb3f0a2943219f7522 # main
        with:
          message: "chore(deps): update meta-buildpack"
          pathspec: "."
      - if: ${{ steps.commit.outputs.commit_sha != '' && steps.update.outputs.semver_bump != '<none>'}}
        uses: paketo-buildpacks/github-config/actions/pull-request/push-branch@fde7603a84a3146cfab723bb3f0a2943219f7522 # main
        with:
          branch: ${{ env.BRANCH_NAME }}
      - if: ${{ steps.commit.outputs.commit_sha != '' && steps.update.outputs.semver_bump != '<none>' }}
        uses: paketo-buildpacks/github-config/actions/pull-request/open@fde7603a84a3146cfab723bb3f0a2943219f7522 # main
        with:
          token: ${{ steps.app-token.outputs.token }}
          title: "chore(deps): update meta-buildpack"
          branch: automation/meta-buildpack/update
